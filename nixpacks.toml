# Laravel + Nginx + PHP-FPM + Queue workers + ESSL (SQL Server ODBC)
# Deploy: set ESSL_DB_* env vars on the host (see .env). DSN name "essl" matches app/Services/EsslService.php

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.setup]
nixPkgs = [
  "nodejs_22",
  "npm-9_x",
  "python311Packages.supervisor",
  "unixODBC",
  "php83Extensions.pdo_odbc",
  "php83Packages.composer"
]
aptPkgs = [
  "curl",
  "gnupg",
  "ca-certificates",
  "apt-transport-https",
  "unixodbc",
  "unixodbc-dev",
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts"
]

[phases.build]
cmds = [
  "cp .env.example .env || true",

  "mkdir -p storage/framework/sessions",
  "mkdir -p storage/framework/views",
  "mkdir -p storage/framework/cache/data",
  "mkdir -p storage/logs",
  "mkdir -p bootstrap/cache",

  "chmod -R 775 storage bootstrap/cache",
  "chown -R www-data:www-data storage bootstrap/cache || true",

  "echo 'VIEW_COMPILED_PATH=/app/storage/framework/views' >> .env",


  "php artisan package:discover --ansi || true",

  "npm ci",
  "npm run build",

  "bash -lc 'set -e; OS_ID=$(grep -E \"^ID=\" /etc/os-release | cut -d= -f2 | tr -d \"\\\"\" ); OS_CODENAME=$(grep -E \"^VERSION_CODENAME=\" /etc/os-release | cut -d= -f2 | tr -d \"\\\"\" ); if [ \"$OS_ID\" = \"debian\" ]; then DISTRO=debian; elif [ \"$OS_ID\" = \"ubuntu\" ]; then DISTRO=ubuntu; else DISTRO=ubuntu; fi; if [ -z \"$OS_CODENAME\" ]; then OS_CODENAME=jammy; fi; curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /usr/share/keyrings/microsoft.gpg; echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/${DISTRO}/${OS_CODENAME}/prod ${OS_CODENAME} main\" > /etc/apt/sources.list.d/microsoft-prod.list; apt-get update; ACCEPT_EULA=Y apt-get install -y msodbcsql18'
]

[start]
cmd = "bash /assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e

cd /app

# Writable dirs for Laravel
chown -R www-data:www-data /app/storage /app/bootstrap/cache
chmod -R 775 /app/storage /app/bootstrap/cache

# ESSL ODBC: register [essl] DSN + ODBC Driver 18 (uses ESSL_DB_* from environment)
bash /assets/configure-essl-odbc.sh

# Nginx config from template (PORT from platform)
node /assets/scripts/prestart.mjs /assets/nginx.template.conf /etc/nginx.conf

# Laravel caches (safe on each container start)
php artisan config:cache --no-ansi || true
php artisan route:cache --no-ansi || true
php artisan view:cache --no-ansi || true

exec supervisord -c /etc/supervisord.conf -n
'''

"configure-essl-odbc.sh" = '''
#!/bin/bash
set -euo pipefail

if [ -z "${ESSL_DB_HOST:-}" ] || [ -z "${ESSL_DB_DATABASE:-}" ]; then
  echo "[essl-odbc] ESSL_DB_HOST / ESSL_DB_DATABASE not set — skip ODBC setup"
  exit 0
fi

PORT="${ESSL_DB_PORT:-1433}"
ENCRYPT="${ESSL_DB_ENCRYPT:-no}"
TRUST="${ESSL_DB_TRUST_SERVER_CERTIFICATE:-yes}"

# Normalize yes/no for ODBC
case "${ENCRYPT,,}" in
  1|true|yes) ENCRYPT="yes" ;;
  *) ENCRYPT="no" ;;
esac
case "${TRUST,,}" in
  1|true|yes) TRUST="yes" ;;
  *) TRUST="no" ;;
esac

DRIVER_SO=""
for pattern in \
  "/opt/microsoft/msodbcsql18/lib64/libmsodbcsql-"*.so* \
  "/usr/lib/x86_64-linux-gnu/odbc/libmsodbcsql-"*.so*; do
  for f in $pattern; do
    if [ -f "$f" ]; then
      DRIVER_SO="$f"
      break 2
    fi
  done
done

if [ -z "$DRIVER_SO" ]; then
  echo "[essl-odbc] ERROR: msodbcsql18 driver .so not found. Rebuild image with msodbcsql18 package."
  exit 1
fi

cat > /etc/odbcinst.ini <<EOF
[ODBC Driver 18 for SQL Server]
Description=Microsoft ODBC Driver 18 for SQL Server
Driver=${DRIVER_SO}
UsageCount=1
EOF

# Named DSN "essl" — matches PDO("odbc:essl", user, pass) in EsslService.php
cat > /etc/odbc.ini <<EOF
[essl]
Driver=ODBC Driver 18 for SQL Server
Server=tcp:${ESSL_DB_HOST},${PORT}
Database=${ESSL_DB_DATABASE}
Encrypt=${ENCRYPT}
TrustServerCertificate=${TRUST}
EOF

export ODBCINI=/etc/odbc.ini
export ODBCSYSINI=/etc

echo "[essl-odbc] DSN [essl] -> ${ESSL_DB_HOST}:${PORT}/${ESSL_DB_DATABASE} (Encrypt=${ENCRYPT}, Trust=${TRUST})"
php -m 2>/dev/null | grep -qi pdo_odbc && echo "[essl-odbc] php pdo_odbc: OK" || echo "[essl-odbc] WARN: php pdo_odbc extension not listed"
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s_%(process_num)02d
command=nginx -c /etc/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-nginx.log
stderr_logfile=/var/log/worker-nginx.log
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s_%(process_num)02d
command=php-fpm -y /assets/php-fpm.conf -F
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-phpfpm.log
stderr_logfile=/var/log/worker-phpfpm.log
'''

"worker-laravel.conf" = '''
[program:worker-laravel]
process_name=%(program_name)s_%(process_num)02d
command=bash -c 'exec php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600'
user=www-data
directory=/app
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=2
startsecs=0
stopwaitsecs=3600
stdout_logfile=/var/log/worker-laravel.log
stderr_logfile=/var/log/worker-laravel.log
'''

"php-fpm.conf" = '''
[global]
error_log = /var/log/php-fpm.log
daemonize = no

[www]
listen = 127.0.0.1:9000
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 4
pm.max_spare_servers = 32
pm.start_servers = 18
clear_env = no
php_admin_value[post_max_size] = 35M
php_admin_value[upload_max_filesize] = 30M
'''

"nginx.template.conf" = '''
user www-data www-data;
worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
  worker_connections  4096;
}

http {
    include    $!{nginx}/conf/mime.types;
    index    index.html index.htm index.php;

    default_type application/octet-stream;
    log_format   main '$remote_addr - $remote_user [$time_local]  $status '
        '"$request" $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx-access.log;
    error_log /var/log/nginx-error.log;
    sendfile     on;
    tcp_nopush   on;
    server_names_hash_bucket_size 128;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name localhost;

        $if(NIXPACKS_PHP_ROOT_DIR) (
            root ${NIXPACKS_PHP_ROOT_DIR};
        ) else (
            root /app/public;
        )

        add_header X-Content-Type-Options "nosniff";

        client_max_body_size 35M;

        index index.php;

        charset utf-8;

        $if(NIXPACKS_PHP_FALLBACK_PATH) (
            location / {
                try_files $uri $uri/ ${NIXPACKS_PHP_FALLBACK_PATH}?$query_string;
            }
        ) else (
          location / {
                try_files $uri $uri/ /index.php?$query_string;
           }
        )

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        $if(IS_LARAVEL) (
            error_page 404 /index.php;
        ) else ()

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''

"scripts/prestart.mjs" = '''
import fs from "fs";

const templatePath = process.argv[2];
const outputPath = process.argv[3];

if (!templatePath || !outputPath) {
  console.error("Usage: node prestart.mjs <template> <output>");
  process.exit(1);
}

let conf = fs.readFileSync(templatePath, "utf8");
const port = process.env.PORT || "8080";

conf = conf.replaceAll("${PORT}", port);
conf = conf.replaceAll("$!{nginx}", process.env.NGINX_PATH || "/nix/var/nix/profiles/default");
conf = conf.replaceAll("${NIXPACKS_PHP_ROOT_DIR}", process.env.NIXPACKS_PHP_ROOT_DIR || "/app/public");
conf = conf.replaceAll("${NIXPACKS_PHP_FALLBACK_PATH}", process.env.NIXPACKS_PHP_FALLBACK_PATH || "/index.php");

const isLaravel = process.env.IS_LARAVEL === "true" || fs.existsSync("/app/artisan");
if (isLaravel) {
  conf = conf.replace(/\$if\(IS_LARAVEL\) \([\s\S]*?\) else \(\)/g, "");
} else {
  conf = conf.replace(/\$if\(IS_LARAVEL\) \([\s\S]*?\) else \(\)/g, "");
  conf = conf.replace(/error_page 404 \/index\.php;/g, "");
}

fs.writeFileSync(outputPath, conf);
console.log(`Wrote nginx config to ${outputPath} (PORT=${port})`);
'''
