openapi: 3.0.3
info:
  title: MonitorHR Mobile Employee API
  description: |
    Staff & Worker self-service REST API for the MonitorHR mobile app.

    ## Authentication
    1. Call `POST /auth/login` with `login` (email, mobile number, or emp code), `password`, `device_id`, and optionally `fcm_token`, `latitude`, `longitude`.
    2. Legacy field `email` is still accepted instead of `login`.
    2. Store the returned `token` securely on the device.
    3. Call `GET /auth/me` with the bearer token to load user, employee profile, and menu.
    4. Send `Authorization: Bearer {token}` on all protected requests.
    5. On `401 Unauthorized`, redirect the user to login.

    ## Access control
    Login requires `access-mobile-app` permission. Screens are listed in `menu` (built from role permissions on the server).

    ## Swagger UI (live docs — auto-updates from YAML)
    Open in browser (no separate install):
    - **Local:** http://127.0.0.1:8000/api/v1/mobile/docs
    - **Staging:** https://staging.kiranindustries.monitorhr.in/api/v1/mobile/docs

    Edit `docs/mobile-api.openapi.yaml` → refresh the page → Swagger shows latest API.

    Raw spec URL: `/api/v1/mobile/docs/openapi.yaml`

    ## Postman — live sync (recommended)
    1. Postman → **Import** → **Link**
    2. Paste: `https://staging.kiranindustries.monitorhr.in/api/v1/mobile/docs/openapi.yaml`
    3. Import as **Collection** (and optionally **API** for schema view)
    4. When you edit `docs/mobile-api.openapi.yaml` in the repo and deploy, click **Sync** on the linked import in Postman — requests update automatically.

    Or import the file once: `docs/mobile-api.postman_collection.json` (manual token setup on Login).
  version: 1.0.0
  contact:
    name: MonitorHR API Support

servers:
  - url: https://staging.kiranindustries.monitorhr.in/api/v1/mobile
    description: Staging (Kiran Industries)
  - url: https://kiranindustries.monitorhr.in/api/v1/mobile
    description: Production (Kiran Industries)
  - url: http://127.0.0.1:8000/api/v1/mobile
    description: Local development

tags:
  - name: Auth
    description: Login, session, and password
  - name: Dashboard
    description: Home screen summary
  - name: Profile
    description: Employee profile (self only)
  - name: Attendance
    description: Clock in/out, history, biometric punches
  - name: Holidays
    description: Branch holidays and week-offs
  - name: Leave
    description: Leave balances and applications
  - name: Payslips
    description: Salary payroll payslips (staff)

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate and receive a Sanctum bearer token. Call GET /auth/me for user, employee, and menu.
      operationId: mobileAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: employee@example.com
              password: password
              device_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
              fcm_token: dGhpcyBpcyBhIGZha2UgZmNtIHRva2Vu
              latitude: 23.0225
              longitude: 72.5714
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user
      description: Returns user, employee profile, and menu.
      operationId: mobileAuthMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current access token.
      operationId: mobileAuthLogout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password:
    post:
      tags: [Auth]
      summary: Change password
      operationId: mobileAuthChangePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Dashboard
      description: Today attendance, shift, leave balances, upcoming holidays, announcements count.
      operationId: mobileDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile:
    get:
      tags: [Profile]
      summary: Get profile
      operationId: mobileProfileShow
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      summary: Update profile
      description: Self-service fields — name, email, phone, and profile image (avatar).
      operationId: mobileProfileUpdate
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProfileUpdateMultipartRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/MessageResponse'
                  - $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /attendance/today:
    get:
      tags: [Attendance]
      summary: Today's attendance
      operationId: mobileAttendanceToday
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Today punch status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceTodayResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /attendance/clock-in:
    post:
      tags: [Attendance]
      summary: Clock in
      description: Requires `clock-in-out` permission. Send GPS coordinates when available.
      operationId: mobileAttendanceClockIn
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLocationRequest'
      responses:
        '200':
          description: Clocked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Already clocked in or configuration missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceActionResponse'

  /attendance/clock-out:
    post:
      tags: [Attendance]
      summary: Clock out
      description: Requires `clock-in-out` permission. Send GPS coordinates when available.
      operationId: mobileAttendanceClockOut
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLocationRequest'
      responses:
        '200':
          description: Clocked out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceActionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Must clock in first or already clocked out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceActionResponse'

  /attendance/history:
    get:
      tags: [Attendance]
      summary: Attendance history
      operationId: mobileAttendanceHistory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MonthQuery'
      responses:
        '200':
          description: Monthly attendance rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /attendance/mispunch:
    get:
      tags: [Attendance]
      summary: Pending mispunch dates (read-only)
      description: Lists past MIS attendance dates for the logged-in employee. Clear via HR web panel only.
      operationId: mobileAttendanceMispunch
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Mispunch list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MispunchListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /attendance/biometric:
    get:
      tags: [Attendance]
      summary: Biometric punches (read-only)
      description: Deprecated — use `/attendance/history` (same data). ESSL / biometric attendance for the authenticated employee.
      deprecated: true
      operationId: mobileAttendanceBiometric
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MonthQuery'
      responses:
        '200':
          description: Monthly biometric rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BiometricHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /shift:
    get:
      tags: [Attendance]
      summary: Assigned shift
      operationId: mobileShift
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Shift with time slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /holidays:
    get:
      tags: [Holidays]
      summary: Holidays and week-offs
      operationId: mobileHolidays
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (defaults to start of current month)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (defaults to end of month +2 months)
      responses:
        '200':
          description: Holidays and week-off rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidaysResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /leave/balances:
    get:
      tags: [Leave]
      summary: Leave balances
      operationId: mobileLeaveBalances
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Own leave balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveBalancesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /leave/applications:
    get:
      tags: [Leave]
      summary: Leave applications
      description: Last 50 applications for the authenticated employee.
      operationId: mobileLeaveApplications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Leave application list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveApplicationsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Leave]
      summary: Apply for leave
      description: Requires `create-leave-applications` permission.
      operationId: mobileLeaveApply
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveApplicationRequest'
            example:
              leave_type_id: 1
              start_date: '2026-06-10'
              end_date: '2026-06-11'
              reason: Personal work
      responses:
        '201':
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveApplicationCreatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /leave/types:
    get:
      tags: [Leave]
      summary: Active leave types
      operationId: mobileLeaveTypes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Leave type dropdown options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveTypesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payslips:
    get:
      tags: [Payslips]
      summary: List payslips
      description: Requires payslip-related permissions (e.g. view-salary-payroll-employee-salary).
      operationId: mobilePayslipsIndex
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payslip list (last 24)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayslipsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /payslips/{payslip}/download:
    get:
      tags: [Payslips]
      summary: Download payslip PDF
      operationId: mobilePayslipsDownload
      security:
        - bearerAuth: []
      parameters:
        - name: payslip
          in: path
          required: true
          schema:
            type: integer
          description: Payslip ID (must belong to authenticated user)
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ErrorMessage'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Token from POST /auth/login

  parameters:
    MonthQuery:
      name: month
      in: query
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
        example: '2026-06'
      description: Calendar month (YYYY-MM). Defaults to current month.

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Forbidden:
      description: Not an employee or mobile access disabled
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    ErrorMessage:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operation completed successfully.

    LoginRequest:
      type: object
      required: [password, device_id]
      properties:
        login:
          type: string
          description: |
            Email, mobile number (10+ digits), or employee code.
            Auto-detected: contains `@` → email; 10+ digits → mobile; otherwise → emp code.
        email:
          type: string
          format: email
          deprecated: true
          description: Legacy alias for `login` when value is an email address.
        password:
          type: string
          format: password
        device_id:
          type: string
          maxLength: 255
          description: Unique device identifier (UUID or hardware ID). Stored with the Sanctum token.
        fcm_token:
          type: string
          maxLength: 500
          nullable: true
          description: Firebase Cloud Messaging token for push notifications
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
          description: GPS latitude at login
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true
          description: GPS longitude at login

    ChangePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
          format: password
        password:
          type: string
          format: password
        password_confirmation:
          type: string
          format: password

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
          nullable: true
        type:
          type: string
          example: employee

    EmployeeShift:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        name:
          type: string
        start_time:
          type: string
          example: '09:00:00'
          nullable: true
        end_time:
          type: string
          example: '18:00:00'
          nullable: true

    EmployeeProfile:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        user_id:
          type: integer
        code:
          type: string
          description: Employee code
        phone:
          type: string
          nullable: true
        branch:
          type: string
          nullable: true
        branch_id:
          type: integer
          nullable: true
        department:
          type: string
          nullable: true
        department_id:
          type: integer
          nullable: true
        designation:
          type: string
          nullable: true
        designation_id:
          type: integer
          nullable: true
        category:
          type: string
          nullable: true
        category_id:
          type: integer
          nullable: true
        date_of_joining:
          type: string
          format: date
          nullable: true
        shift:
          $ref: '#/components/schemas/EmployeeShift'

    AuthPayload:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        employee:
          $ref: '#/components/schemas/EmployeeProfile'
        menu:
          type: array
          items:
            $ref: '#/components/schemas/MobileMenuItem'

    MobileMenuItem:
      type: object
      required: [key, title]
      properties:
        key:
          type: string
          example: leave_management
        title:
          type: string
          example: Leave Management
        children:
          type: array
          items:
            $ref: '#/components/schemas/MobileMenuItem'

    LoginResponse:
      type: object
      required: [message, token]
      properties:
        message:
          type: string
          example: Logged in successfully.
        token:
          type: string
          description: Sanctum plain-text bearer token. Use with GET /auth/me for session details.

    ProfileResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        employee:
          $ref: '#/components/schemas/EmployeeProfile'

    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          nullable: true
        phone:
          type: string
          maxLength: 30
          nullable: true

    ProfileUpdateMultipartRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        avatar:
          type: string
          format: binary
          description: Profile image (also accepts field name profile_image)
        profile_image:
          type: string
          format: binary
          description: Alias for avatar

    AttendanceLocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 23.0225
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 72.5714

    GeoLocation:
      type: object
      nullable: true
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    AttendancePunchPair:
      type: object
      properties:
        shift:
          type: string
          nullable: true
        in:
          type: string
          nullable: true
          example: '09:09:00'
        out:
          type: string
          nullable: true
          example: '18:05:00'

    AttendanceRecord:
      type: object
      nullable: true
      properties:
        attendance_date:
          type: string
          format: date
        date:
          type: string
          format: date
        clock_in:
          type: string
          example: '09:15:00'
          nullable: true
        clock_out:
          type: string
          example: '18:05:00'
          nullable: true
        status:
          type: string
          description: Biometric status (P, A, MIS, H, W) or legacy present/absent
          nullable: true
        source:
          type: string
          enum: [essl, mobile, manual, mixed]
          nullable: true
          description: How today's attendance was recorded
        is_manual:
          type: boolean
        total_hours:
          type: string
          example: '9h 0m'
          nullable: true
        can_clock_in:
          type: boolean
          description: Whether mobile clock-in is allowed now
        can_clock_out:
          type: boolean
          description: Whether mobile clock-out is allowed now
        punches:
          type: array
          items:
            $ref: '#/components/schemas/AttendancePunchPair'
        clock_in_location:
          $ref: '#/components/schemas/GeoLocation'
        clock_out_location:
          $ref: '#/components/schemas/GeoLocation'
        message:
          type: string
          nullable: true
          description: Why mobile clock is blocked or HR guidance

    MispunchListResponse:
      type: object
      properties:
        message:
          type: string
        records:
          type: array
          items:
            type: object
            properties:
              attendance_date:
                type: string
                format: date
              status:
                type: string
              source:
                type: string
              is_manual:
                type: boolean
              clock_in:
                type: string
                nullable: true
              clock_out:
                type: string
                nullable: true
              punches:
                type: array
                items:
                  $ref: '#/components/schemas/AttendancePunchPair'
              message:
                type: string

    DashboardResponse:
      type: object
      properties:
        today_attendance:
          $ref: '#/components/schemas/AttendanceRecord'
        attendance_mode:
          type: string
          enum: [essl, mobile, both]
          description: Employee attendance channel preference (default both)
        shift:
          $ref: '#/components/schemas/EmployeeShift'
        leave_balances:
          type: array
          items:
            $ref: '#/components/schemas/LeaveBalanceSummary'
        upcoming_holidays:
          type: array
          items:
            $ref: '#/components/schemas/HolidaySummary'
        announcements_count:
          type: integer

    LeaveBalanceSummary:
      type: object
      properties:
        leave_type_id:
          type: integer
        leave_type:
          type: string
        allocated_days:
          type: number
          format: float
        used_days:
          type: number
          format: float
        remaining_days:
          type: number
          format: float
        year:
          type: integer

    HolidaySummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_paid:
