; Supervisor config for Kiran Industries production server
; Install: sudo cp supervisor-kiran.conf /etc/supervisor/conf.d/kiran.conf && sudo supervisorctl reread && sudo supervisorctl update

[program:kiran-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/kiranindustries/artisan queue:work --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/kiranindustries/storage/logs/queue-worker.log

[program:kiran-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/kiranindustries/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/kiranindustries/storage/logs/scheduler.log
; Scheduled tasks (via schedule:work):
;   scheduler-heartbeat  — every minute (UI "scheduler running" indicator)
;   essl:auto-sync       — every minute inside configured IST time ranges
;   activity-logs:cleanup — daily 03:00
;   reports:cleanup      — daily

[program:kiran-essl-queue-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/kiranindustries/artisan essl:ensure-scheduler
autostart=true
autorestart=true
startsecs=10
startretries=5
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/kiranindustries/storage/logs/essl-queue-scheduler.log
; Fallback: queue-based tick every 1 min (works if schedule:work is down but queue:work is up)
